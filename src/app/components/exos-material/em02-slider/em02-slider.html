<h3>Em02 — Slider de luminosité</h3>

<!--
  En Angular Material 3, mat-slider utilise une syntaxe avec
  un <input matSliderThumb> enfant pour l'accessibilité.
  (valueChange) émet la valeur numérique directement.
-->
<mat-slider min="0" max="100" style="width: 100%">
  <input matSliderThumb
         [value]="luminosite()"
         (valueChange)="luminosite.set($event)">
</mat-slider>

<div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem">
  <mat-icon>{{ icone() }}</mat-icon>
  <span>{{ luminosite() }} %</span>
</div>
