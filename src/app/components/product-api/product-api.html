<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h3> Tableau des produits via service HTTP </h3>
        <p>Affichage du contenu de notre back-end.</p>
    </div>

   
</div>

@if(errorMessage()) {
    <p>{{errorMessage()}}</p>
}

<table mat-table [dataSource]="products" matSort>

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
        <td mat-cell *matCellDef="let product">{{product.name}}</td>
    </ng-container>

    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let product">{{product.description}}</td>
    </ng-container>

    <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Prix (€)</th>
        <td mat-cell *matCellDef="let product">{{product.price  | number:'1.2-2'}}</td>
    </ng-container>

    <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Catégorie</th>
        <td mat-cell *matCellDef="let product">{{product.category}}</td>
    </ng-container>

    <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock</th>
        <td mat-cell *matCellDef="let product">{{product.stock}}</td>
    </ng-container>

    <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let product">
            <button mat-button (click)="deleteProduct(product)">Supprimer</button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colonnesAffichees"></tr>
    <tr mat-row *matRowDef="let row; columns : colonnesAffichees;"></tr>

</table>

<mat-paginator [pageSize]="5" 
                [pageSizeOptions]="[5,10,20,50]"
                showFirstLastButton>
</mat-paginator>
